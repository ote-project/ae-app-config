db = { include required("autolab_db.conf") }
sut = { include required("autolab_sut_base.conf") }
sut = {
    command-line-addition = ["--example", "MetricsController#get_num_pending_instances"],
}
solver = { include required("autolab_solver.conf") }
scalar-inputs = [
    { name = "now", vk = "timestamp" },
    { name = "user_id", vk = "long" },
    { name = "course_name", vk = "string", constraints = [ { type = "string-not-empty" } ] },
]

