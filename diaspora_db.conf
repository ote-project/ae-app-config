    { type = "one-of-string", tbl = "likes", col = "target_type", allowed-values = ["Post", "Photo"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `likes` WHERE `target_type` = 'Post'",  sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `likes` WHERE `target_type` = 'Photo'", sql-2 = "SELECT `id` FROM `photos`" },

    //   Diaspora::MentionsContainer.
    { type = "one-of-string", tbl = "mentions", col = "mentions_container_type", allowed-values = ["Post", "Comment"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `mentions_container_id` FROM `mentions` WHERE `mentions_container_type` = 'Post'",    sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `mentions_container_id` FROM `mentions` WHERE `mentions_container_type` = 'Comment'", sql-2 = "SELECT `id` FROM `comments`" },
    // End polymorphic associations.

    // Below are constraints that help with concolic execution.
    { type = "one-of-string", tbl = "users", col = "language", allowed-values = ["en"] },
    { type = "one-of-string", tbl = "users", col = "color_theme", allowed-values = ["original"] },

    // FIXME(zhangwen): The application is stuck on "Reshare" posts for now; add it back!
