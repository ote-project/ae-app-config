    { type = "foreign-key", from-tbl = "poll_participations", from-col = "poll_answer_id", to-tbl = "poll_answers", to-col = "id" },
    { type = "foreign-key", from-tbl = "poll_participations", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "poll_participations", from-col = "poll_id", to-tbl = "polls", to-col = "id" },
    { type = "foreign-key", from-tbl = "participations", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "likes", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "taggings", from-col = "tag_id", to-tbl = "tags", to-col = "id" },
    { type = "foreign-key", from-tbl = "conversations", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "conversation_visibilities", from-col = "conversation_id", to-tbl = "conversations", to-col = "id" },
    { type = "foreign-key", from-tbl = "conversation_visibilities", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "roles", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "aspects", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "aspect_memberships", from-col = "aspect_id", to-tbl = "aspects", to-col = "id" },
    { type = "foreign-key", from-tbl = "aspect_memberships", from-col = "contact_id", to-tbl = "contacts", to-col = "id" },
    { type = "foreign-key", from-tbl = "aspect_visibilities", from-col = "aspect_id", to-tbl = "aspects", to-col = "id" },
    { type = "foreign-key", from-tbl = "services", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "contacts", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "contacts", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "user_preferences", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "tag_followings", from-col = "tag_id", to-tbl = "tags", to-col = "id" },
    { type = "foreign-key", from-tbl = "tag_followings", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "reports", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "blocks", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "blocks", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "invitation_codes", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "messages", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "messages", from-col = "conversation_id", to-tbl = "conversations", to-col = "id" },
    { type = "foreign-key", from-tbl = "notifications", from-col = "recipient_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "notification_actors", from-col = "notification_id", to-tbl = "notifications", to-col = "id" },
    { type = "foreign-key", from-tbl = "notification_actors", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "account_deletions", from-col = "person_id", to-tbl = "people", to-col = "id" },

    // Non-null columns not reflected in the schema (but is enforced in the application).
    { type = "string-is-not-empty", tbl = "comments", col = "text" }, // `validates :text, :presence => true`
    { type = "string-is-not-empty", tbl = "messages", col = "text" }, // `validates :text, presence: true`
    { type = "non-null", tbl = "tags", col = "name" }, // from the ActsAsTaggableOn gem
    { type = "non-null", tbl = "likes", col = "guid" },
    { type = "non-null", tbl = "participations", col = "guid" },
    { type = "non-null", tbl = "polls", col = "guid" },
    { type = "non-null", tbl = "poll_answers", col = "guid" },
    { type = "non-null", tbl = "poll_participations", col = "guid" },
    // `belongs_to` associations are by default required in Rails 5.
    { type = "non-null", tbl = "blocks", col = "user_id" },
    { type = "non-null", tbl = "blocks", col = "person_id" },
    { type = "non-null", tbl = "likes", col = "author_id" },
    { type = "non-null", tbl = "notification_actors", col = "notification_id" },
    { type = "non-null", tbl = "notification_actors", col = "person_id" },

    // Reshare.
    //   A Reshare must be public.
    { type = "query-is-empty", sql = "SELECT 1 FROM `posts` WHERE `posts`.`type` = 'Reshare' AND `posts`.`public` = 0"},
    //   A Reshare's parent must be public.
    { type = "query-is-empty", sql = "SELECT 1 FROM `posts` `myself`, `posts` `parent` WHERE `myself`.`root_guid` = `parent`.`guid` AND `parent`.`public` = 0"},
    //   No Reshare loops -- parent post must have smaller ID than post.
    { type = "query-is-empty", sql = "SELECT 1 FROM `posts` `myself`, `posts` `parent` WHERE `myself`.`root_guid` = `parent`.`guid` AND `myself`.`id` <= `parent`.`id`"},
    //   A StatusMessage does not have a parent.
    { type = "query-is-empty", sql = "SELECT 1 FROM `posts` WHERE `posts`.`type` = 'StatusMessage' AND `posts`.`root_guid` IS NOT NULL"},

    // Poll integrity.
    { type = "query-is-empty", sql = "SELECT 1 FROM `poll_participations` `pp`, `poll_answers` `pa` WHERE `pp`.`poll_answer_id` = `pa`.`id` AND `pp`.`poll_id` <> `pa`.`poll_id` " },

    // Person.owner_xor_pod.
    { type = "query-is-empty", sql = "SELECT 1 FROM `people` WHERE `people`.`owner_id` IS NULL AND `people`.`pod_id` IS NULL" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `people` WHERE `people`.`owner_id` IS NOT NULL AND `people`.`pod_id` IS NOT NULL" },

    // Polymorphic associations.
    //   Diaspora::Shareable.
    { type = "one-of-string", tbl = "aspect_visibilities", col = "shareable_type", allowed-values = ["Post", "Photo"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `shareable_id` FROM `aspect_visibilities` WHERE `shareable_type` = 'Post'",  sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `shareable_id` FROM `aspect_visibilities` WHERE `shareable_type` = 'Photo'", sql-2 = "SELECT `id` FROM `photos`" },

    { type = "one-of-string", tbl = "share_visibilities", col = "shareable_type", allowed-values = ["Post", "Photo"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `shareable_id` FROM `share_visibilities` WHERE `shareable_type` = 'Post'",  sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `shareable_id` FROM `share_visibilities` WHERE `shareable_type` = 'Photo'", sql-2 = "SELECT `id` FROM `photos`" },

    //   Diaspora::Commentable.
    { type = "one-of-string", tbl = "comments", col = "commentable_type", allowed-values = ["Post"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `commentable_id` FROM `comments` WHERE `commentable_type` = 'Post'", sql-2 = "SELECT `id` FROM `posts`" },

    //   Diaspora::Likeable.
    { type = "one-of-string", tbl = "likes", col = "target_type", allowed-values = ["Post"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `likes` WHERE `target_type` = 'Post'", sql-2 = "SELECT `id` FROM `posts`" },

    //   Diaspora::MentionsContainer.
    { type = "one-of-string", tbl = "mentions", col = "mentions_container_type", allowed-values = ["Post", "Comment"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `mentions_container_id` FROM `mentions` WHERE `mentions_container_type` = 'Post'",    sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `mentions_container_id` FROM `mentions` WHERE `mentions_container_type` = 'Comment'", sql-2 = "SELECT `id` FROM `comments`" },

    //   Notifications
    { type = "non-null", tbl = "notifications", col = "type" },
    { type = "one-of-string", tbl = "notifications", col = "type",
      allowed-values = ["Notifications::AlsoCommented", "Notifications::CommentOnPost", "Notifications::ContactsBirthday", "Notifications::Liked", "Notifications::MentionedInComment",
                        "Notifications::MentionedInPost", "Notifications::Reshared", "Notifications::StartedSharing"]
    }, // If I read it correctly, "Notifications::PrivateMessage" never appears in the database.
    { type = "non-null", tbl = "notifications", col = "target_type" },
    { type = "non-null", tbl = "notifications", col = "target_id" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::AlsoCommented'      AND `target_type` <> 'Post'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::CommentOnPost'      AND `target_type` <> 'Post'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::ContactsBirthday'   AND `target_type` <> 'Person'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::Liked'              AND `target_type` <> 'Post'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::MentionedInComment' AND `target_type` <> 'Mention'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::MentionedInPost'    AND `target_type` <> 'Mention'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::Reshared'           AND `target_type` <> 'Post'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::StartedSharing'     AND `target_type` <> 'Person'" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::AlsoCommented'",      sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::CommentOnPost'",      sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::ContactsBirthday'",   sql-2 = "SELECT `id` FROM `people`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::Liked'",              sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::MentionedInComment'", sql-2 = "SELECT `id` FROM `mentions`" },
    // The target of a `MentionedInComment` notification must be a mention in a comment.
    { type = "query-is-empty", sql = "SELECT 1 FROM `mentions` INNER JOIN `notifications` ON `notifications`.`type` = 'Notifications::MentionedInComment' AND `mentions`.`id` = `notifications`.`target_id` WHERE `mentions`.`mentions_container_type` <> 'Comment'" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::MentionedInPost'",    sql-2 = "SELECT `id` FROM `mentions`" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `mentions` INNER JOIN `notifications` ON `notifications`.`type` = 'Notifications::MentionedInPost' AND `mentions`.`id` = `notifications`.`target_id` WHERE `mentions`.`mentions_container_type` <> 'Post'" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::Reshared'",           sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::StartedSharing'",     sql-2 = "SELECT `id` FROM `people`" },
    // End polymorphic associations.

    // FIXME(zhangwen): The application is stuck on "Reshare" posts for now; add it back!
    //   Or "extract" this branch from the application, if possible?  (Should we explore all options?)
    //   Rails seems to decide which class to instantiate (e.g., Reshare or just Post) from the "type" column.
    //   Another issue: A branch for ~IsNil is recorded only when type is non-NULL.
    { type = "one-of-string", tbl = "posts", col = "type", allowed-values = ["StatusMessage", "Reshare"] },
    { type = "one-of-string", tbl = "services", col = "type", allowed-values = ["Services::Tumblr", "Services::Twitter", "Services::Wordpress"] },

    // Otherwise, Photo.url freaks out.
    { type = "query-is-empty", sql = "SELECT 1 FROM photos WHERE remote_photo_path IS NOT NULL AND remote_photo_name IS NULL" },

    // If GUID is empty, one will be generated and used -- we don't want that.
    { type = "string-is-not-empty", tbl = "comments", col = "guid" },
    { type = "string-is-not-empty", tbl = "comments", col = "guid" },
    { type = "string-is-not-empty", tbl = "conversations", col = "guid" },
    { type = "string-is-not-empty", tbl = "likes", col = "guid" },
    { type = "string-is-not-empty", tbl = "messages", col = "guid" },
    { type = "string-is-not-empty", tbl = "participations", col = "guid" },
    { type = "string-is-not-empty", tbl = "people", col = "guid" },
    { type = "string-is-not-empty", tbl = "photos", col = "guid" },
    { type = "string-is-not-empty", tbl = "poll_answers", col = "guid" },
    { type = "string-is-not-empty", tbl = "poll_participations", col = "guid" },
    { type = "string-is-not-empty", tbl = "polls", col = "guid" },
    { type = "string-is-not-empty", tbl = "posts", col = "guid" },
    { type = "string-is-not-empty", tbl = "ppid", col = "guid" },

    // === Below are constraints that help with concolic execution. ===
    { type = "nullable-strings-not-empty" },

    { type = "one-of-string", tbl = "users", col = "username", allowed-values = ["a", "b", "c", "d", "e", "f", "g"] },
    { type = "non-null", tbl = "users", col = "language" }, { type = "one-of-string", tbl = "users", col = "language", allowed-values = ["en"] },
    { type = "non-null", tbl = "users", col = "color_theme" }, { type = "one-of-string", tbl = "users", col = "color_theme", allowed-values = ["original"] },
    { type = "one-of-string", tbl = "people", col = "diaspora_handle", allowed-values = ["a", "b", "c", "d", "e", "f", "g"] },
    { type = "one-of-string", tbl = "pods", col = "host", allowed-values = ["www.example.com"] },

    // Reduce irrelevant branching.
    { type = "query-is-empty", sql = "SELECT 1 FROM `profiles` WHERE `profiles`.`image_url` IS NOT NULL" }, // Force profile images to be null.
    { type = "query-is-empty", sql = "SELECT 1 FROM `profiles` WHERE `profiles`.`image_url_small` IS NOT NULL" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `profiles` WHERE `profiles`.`image_url_medium` IS NOT NULL" },

    // TODO(zhangwen): Justify this pruning.
    { type = "non-null", tbl = "photos", col = "remote_photo_path" },
