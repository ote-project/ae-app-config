constraints = [
    // Primary keys.
    { type = "unique", tbl = "users", cols = ["id"] },
    { type = "unique", tbl = "people", cols = ["id"] },
    { type = "unique", tbl = "posts", cols = ["id"] },
    { type = "unique", tbl = "share_visibilities", cols = ["id"] },
    { type = "unique", tbl = "mentions", cols = ["id"] },
    { type = "unique", tbl = "comments", cols = ["id"] },
    { type = "unique", tbl = "profiles", cols = ["id"] },
    { type = "unique", tbl = "photos", cols = ["id"] },
    { type = "unique", tbl = "locations", cols = ["id"] },
    { type = "unique", tbl = "polls", cols = ["id"] },
    { type = "unique", tbl = "poll_answers", cols = ["id"] },
    { type = "unique", tbl = "poll_participations", cols = ["id"] },
    { type = "unique", tbl = "participations", cols = ["id"] },
    { type = "unique", tbl = "likes", cols = ["id"] },
    { type = "unique", tbl = "tags", cols = ["id"] },
    { type = "unique", tbl = "taggings", cols = ["id"] },
    { type = "unique", tbl = "notifications", cols = ["id"] },
    { type = "unique", tbl = "notification_actors", cols = ["id"] },
    { type = "unique", tbl = "conversations", cols = ["id"] },
    { type = "unique", tbl = "conversation_visibilities", cols = ["id"] },
    { type = "unique", tbl = "roles", cols = ["id"] },
    { type = "unique", tbl = "aspects", cols = ["id"] },
    { type = "unique", tbl = "aspect_memberships", cols = ["id"] },
    { type = "unique", tbl = "aspect_visibilities", cols = ["id"] },
    { type = "unique", tbl = "services", cols = ["id"] },
    { type = "unique", tbl = "contacts", cols = ["id"] },
    { type = "unique", tbl = "user_preferences", cols = ["id"] },
    { type = "unique", tbl = "tag_followings", cols = ["id"] },
    { type = "unique", tbl = "reports", cols = ["id"] },
    { type = "unique", tbl = "blocks", cols = ["id"] },
    { type = "unique", tbl = "invitation_codes", cols = ["id"] },
    { type = "unique", tbl = "messages", cols = ["id"] },
    { type = "unique", tbl = "account_deletions", cols = ["id"] },
    { type = "unique", tbl = "o_embed_caches", cols = ["id"] },
    { type = "unique", tbl = "open_graph_caches", cols = ["id"] },
    { type = "unique", tbl = "pods", cols = ["id"] },

    // Uniqueness.
    { type = "unique", tbl = "users", cols = ["username"] },
    { type = "unique", tbl = "users", cols = ["email"] },
    { type = "unique", tbl = "users", cols = ["authentication_token"] },
    { type = "unique", tbl = "people", cols = ["guid"] },
    { type = "unique", tbl = "people", cols = ["diaspora_handle"] },
    { type = "unique", tbl = "people", cols = ["owner_id"] },
    { type = "unique", tbl = "profiles", cols = ["person_id"] }, // Each person has only one profile.
    { type = "unique", tbl = "posts", cols = ["guid"] },
    { type = "unique", tbl = "posts", cols = ["author_id", "root_guid"] },
    { type = "unique", tbl = "comments", cols = ["guid"] },
    { type = "unique", tbl = "photos", cols = ["guid"] },
    { type = "unique", tbl = "polls", cols = ["guid"] },
    { type = "unique", tbl = "poll_answers", cols = ["guid"] },
    { type = "unique", tbl = "poll_participations", cols = ["guid"] },
    { type = "unique", tbl = "poll_participations", cols = ["poll_id", "author_id"] },
    { type = "unique", tbl = "participations", cols = ["target_id", "target_type", "author_id"] },
    { type = "unique", tbl = "likes", cols = ["guid"] },
    { type = "unique", tbl = "likes", cols = ["target_id", "author_id", "target_type"] },
    { type = "unique", tbl = "tags", cols = ["name"] },
    { type = "unique", tbl = "taggings", cols = ["taggable_id", "taggable_type", "tag_id"] },
    { type = "unique", tbl = "conversations", cols = ["guid"] },
    { type = "unique", tbl = "conversation_visibilities", cols = ["conversation_id", "person_id"] },
    { type = "unique", tbl = "roles", cols = ["person_id", "name"] },
    { type = "unique", tbl = "aspects", cols = ["user_id", "name"] },
    { type = "unique", tbl = "services", cols = ["type", "uid"] },
    { type = "unique", tbl = "contacts", cols = ["user_id", "person_id"] },
    { type = "unique", tbl = "tag_followings", cols = ["tag_id", "user_id"] },
    { type = "unique", tbl = "reports", cols = ["item_id", "item_type", "user_id"] },
    { type = "unique", tbl = "blocks", cols = ["user_id", "person_id"] },
    { type = "unique", tbl = "aspect_memberships", cols = ["aspect_id", "contact_id"] },
    { type = "unique", tbl = "aspect_visibilities", cols = ["shareable_id", "shareable_type", "aspect_id"] },
    { type = "unique", tbl = "messages", cols = ["guid"] },
    { type = "unique", tbl = "notification_actors", cols = ["notification_id", "person_id"] },
    { type = "unique", tbl = "account_deletions", cols = ["person_id"] },
    { type = "unique", tbl = "share_visibilities", cols = ["shareable_id", "shareable_type", "user_id"] },
    { type = "unique", tbl = "mentions", cols = ["person_id", "mentions_container_id", "mentions_container_type"] },

    { type = "foreign-key", from-tbl = "users", from-col = "invited_by_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "users", from-col = "id", to-tbl = "people", to-col = "owner_id" }, // Each user has a "person".
    { type = "foreign-key", from-tbl = "people", from-col = "owner_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key", from-tbl = "people", from-col = "id", to-tbl = "profiles", to-col = "person_id"}, // Each person has a profile.
    { type = "foreign-key", from-tbl = "people", from-col = "pod_id", to-tbl = "pods", to-col = "id"},
    { type = "foreign-key-non-null", from-tbl = "posts", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "posts", from-col = "root_guid", to-tbl = "posts", to-col = "guid" },
    { type = "foreign-key", from-tbl = "posts", from-col = "o_embed_cache_id", to-tbl = "o_embed_caches", to-col = "id" },
    { type = "foreign-key", from-tbl = "posts", from-col = "open_graph_cache_id", to-tbl = "open_graph_caches", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "share_visibilities", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "mentions", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "comments", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "profiles", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "photos", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key", from-tbl = "photos", from-col = "status_message_guid", to-tbl = "posts", to-col = "guid" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `status_message_id` FROM `locations`", sql-2 = "SELECT `id` FROM `posts` WHERE `type` = 'StatusMessage'" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `status_message_id` FROM `polls`", sql-2 = "SELECT `id` FROM `posts` WHERE `type` = 'StatusMessage'" },
    { type = "foreign-key-non-null", from-tbl = "poll_answers", from-col = "poll_id", to-tbl = "polls", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "poll_participations", from-col = "poll_answer_id", to-tbl = "poll_answers", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "poll_participations", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "poll_participations", from-col = "poll_id", to-tbl = "polls", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "participations", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "likes", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "taggings", from-col = "tag_id", to-tbl = "tags", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "conversations", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "conversation_visibilities", from-col = "conversation_id", to-tbl = "conversations", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "conversation_visibilities", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "roles", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "aspects", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "aspect_memberships", from-col = "aspect_id", to-tbl = "aspects", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "aspect_memberships", from-col = "contact_id", to-tbl = "contacts", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "aspect_visibilities", from-col = "aspect_id", to-tbl = "aspects", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "services", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "contacts", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "contacts", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "user_preferences", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "tag_followings", from-col = "tag_id", to-tbl = "tags", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "tag_followings", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "reports", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "blocks", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "blocks", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "invitation_codes", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "messages", from-col = "author_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "messages", from-col = "conversation_id", to-tbl = "conversations", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "notifications", from-col = "recipient_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "notification_actors", from-col = "notification_id", to-tbl = "notifications", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "notification_actors", from-col = "person_id", to-tbl = "people", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "account_deletions", from-col = "person_id", to-tbl = "people", to-col = "id" },

    // Non-null columns not reflected in the schema (but is enforced in the application).
    { type = "string-is-not-empty", tbl = "comments", col = "text" }, // `validates :text, :presence => true`
    { type = "string-is-not-empty", tbl = "messages", col = "text" }, // `validates :text, presence: true`
    { type = "non-null", tbl = "tags", col = "name" }, // from the ActsAsTaggableOn gem
    { type = "non-null", tbl = "likes", col = "guid" },
    { type = "non-null", tbl = "participations", col = "guid" },
    { type = "non-null", tbl = "polls", col = "guid" },
    { type = "non-null", tbl = "poll_answers", col = "guid" },
    { type = "non-null", tbl = "poll_participations", col = "guid" },
    // `belongs_to` associations are by default required in Rails 5.
    { type = "non-null", tbl = "blocks", col = "user_id" },
    { type = "non-null", tbl = "blocks", col = "person_id" },
    { type = "non-null", tbl = "likes", col = "author_id" },
    { type = "non-null", tbl = "notification_actors", col = "notification_id" },
    { type = "non-null", tbl = "notification_actors", col = "person_id" },

    // Reshare.
    //   A Reshare must be public.
    { type = "query-is-empty", sql = "SELECT 1 FROM `posts` WHERE `posts`.`type` = 'Reshare' AND `posts`.`public` = 0"},
    //   A Reshare's parent must be public.
    { type = "query-is-empty", sql = "SELECT 1 FROM `posts` `myself`, `posts` `parent` WHERE `myself`.`root_guid` = `parent`.`guid` AND `parent`.`public` = 0"},
    //   No Reshare loops -- parent post must have smaller ID than post.
    { type = "query-is-empty", sql = "SELECT 1 FROM `posts` `myself`, `posts` `parent` WHERE `myself`.`root_guid` = `parent`.`guid` AND `myself`.`id` <= `parent`.`id`"},
    //   A StatusMessage does not have a parent.
    { type = "query-is-empty", sql = "SELECT 1 FROM `posts` WHERE `posts`.`type` = 'StatusMessage' AND `posts`.`root_guid` IS NOT NULL"},

    // Post counts.
    { type = "query-is-empty", sql = "SELECT 1 FROM `posts` WHERE `posts`.`comments_count` < 0" },
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT `posts`.`id` FROM `posts` WHERE `posts`.`comments_count` <> 0",
      sql-2 = "SELECT `comments`.`commentable_id` FROM `comments` WHERE `comments`.`commentable_type` = 'Post'" },
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT `comments`.`commentable_id` FROM `comments` WHERE `comments`.`commentable_type` = 'Post'",
      sql-2 = "SELECT `id` FROM `posts` WHERE `posts`.`comments_count` <> 0" },

    // Conversation visibility unread.
    { type = "query-is-empty", sql = "SELECT 1 FROM `conversation_visibilities` WHERE `conversation_visibilities`.`unread` < 0" },

    // Poll integrity.
    { type = "query-is-empty", sql = "SELECT 1 FROM `poll_participations` `pp`, `poll_answers` `pa` WHERE `pp`.`poll_answer_id` = `pa`.`id` AND `pp`.`poll_id` <> `pa`.`poll_id` " },

    // Person.owner_xor_pod.
    { type = "query-is-empty", sql = "SELECT 1 FROM `people` WHERE `people`.`owner_id` IS NULL AND `people`.`pod_id` IS NULL" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `people` WHERE `people`.`owner_id` IS NOT NULL AND `people`.`pod_id` IS NOT NULL" },

    // Polymorphic associations.
    //   Diaspora::Shareable.
    { type = "one-of-string", tbl = "aspect_visibilities", col = "shareable_type", allowed-values = ["Post", "Photo"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `shareable_id` FROM `aspect_visibilities` WHERE `shareable_type` = 'Post'",  sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `shareable_id` FROM `aspect_visibilities` WHERE `shareable_type` = 'Photo'", sql-2 = "SELECT `id` FROM `photos`" },

    { type = "one-of-string", tbl = "share_visibilities", col = "shareable_type", allowed-values = ["Post", "Photo"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `shareable_id` FROM `share_visibilities` WHERE `shareable_type` = 'Post'",  sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `shareable_id` FROM `share_visibilities` WHERE `shareable_type` = 'Photo'", sql-2 = "SELECT `id` FROM `photos`" },

    //   Diaspora::Commentable.
    { type = "one-of-string", tbl = "comments", col = "commentable_type", allowed-values = ["Post", "Photo"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `commentable_id` FROM `comments` WHERE `commentable_type` = 'Post'", sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `commentable_id` FROM `comments` WHERE `commentable_type` = 'Photo'", sql-2 = "SELECT `id` FROM `photos`" },

    // NOT OBVIOUS: The code assumes a comment's parent is a post (e.g., see notifications_helper.rb:41) and can crash when it is a photo.
    { type = "one-of-string", tbl = "comments", col = "commentable_type", allowed-values = ["Post"] },

    //   Diaspora::Likeable.
    { type = "one-of-string", tbl = "likes", col = "target_type", allowed-values = ["Post"] }, // From application code, one can only like posts.
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `likes` WHERE `target_type` = 'Post'", sql-2 = "SELECT `id` FROM `posts`" },

    //   Diaspora::MentionsContainer.
    { type = "one-of-string", tbl = "mentions", col = "mentions_container_type", allowed-values = ["Post", "Comment"] },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `mentions_container_id` FROM `mentions` WHERE `mentions_container_type` = 'Post'",    sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `mentions_container_id` FROM `mentions` WHERE `mentions_container_type` = 'Comment'", sql-2 = "SELECT `id` FROM `comments`" },

    //   Notifications
    { type = "non-null", tbl = "notifications", col = "type" },
    { type = "one-of-string", tbl = "notifications", col = "type",
      allowed-values = ["Notification", "Notifications::AlsoCommented", "Notifications::CommentOnPost", "Notifications::ContactsBirthday", "Notifications::Liked", "Notifications::MentionedInComment",
                        "Notifications::MentionedInPost", "Notifications::PrivateMessage", "Notifications::Reshared", "Notifications::StartedSharing"]
    },
    // NOT OBVIOUS:
    //  - A notification cannot be of the base class `Notification`, which does not have method `popup_translation_key` defined.
    //  - From the code, a `PrivateMessage` notification is never inserted into the database.  See Notifications::PrivateMessage.notify_message -- it doesn't create a database row.
    //    TODO(zhangwen): `PrivateMessage` has two possible types of targets (`Message` or `Conversation`), but when NotificationsController fetches its target, no branch is recorded on `target_type`.
    //                    I think this is a lack of tracking in `includes(:target:)`.  Fix this.
    // This constraint is written as a `one-of-string` because the system uses such constraints when simplifying views.
    { type = "one-of-string", tbl = "notifications", col = "type",
      allowed-values = ["Notifications::AlsoCommented", "Notifications::CommentOnPost", "Notifications::ContactsBirthday", "Notifications::Liked", "Notifications::MentionedInComment",
                        "Notifications::MentionedInPost", "Notifications::Reshared", "Notifications::StartedSharing"]
    },
    { type = "non-null", tbl = "notifications", col = "target_id" },
    { type = "non-null", tbl = "notifications", col = "target_type" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::AlsoCommented'      AND `target_type` <> 'Post'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::CommentOnPost'      AND `target_type` <> 'Post'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::ContactsBirthday'   AND `target_type` <> 'Person'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::Liked'              AND `target_type` <> 'Post'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::MentionedInComment' AND `target_type` <> 'Mention'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::MentionedInPost'    AND `target_type` <> 'Mention'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::PrivateMessage'     AND `target_type` NOT IN ('Conversation', 'Message')" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::Reshared'           AND `target_type` <> 'Post'" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `notifications` WHERE `type` = 'Notifications::StartedSharing'     AND `target_type` <> 'Person'" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `target_type` = 'Post'",         sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `target_type` = 'Person'",       sql-2 = "SELECT `id` FROM `people`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `target_type` = 'Mention'",      sql-2 = "SELECT `id` FROM `mentions`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `target_type` = 'Conversation'", sql-2 = "SELECT `id` FROM `conversations`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `target_type` = 'Message'",      sql-2 = "SELECT `id` FROM `messages`" },

    // The target of a `MentionedInComment` notification must be a mention in a comment.
    { type = "query-is-empty", sql = "SELECT 1 FROM `mentions` INNER JOIN `notifications` ON `notifications`.`type` = 'Notifications::MentionedInComment' AND `mentions`.`id` = `notifications`.`target_id` WHERE `mentions`.`mentions_container_type` <> 'Comment'" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::MentionedInPost'",    sql-2 = "SELECT `id` FROM `mentions`" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `mentions` INNER JOIN `notifications` ON `notifications`.`type` = 'Notifications::MentionedInPost' AND `mentions`.`id` = `notifications`.`target_id` WHERE `mentions`.`mentions_container_type` <> 'Post'" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::Reshared'",           sql-2 = "SELECT `id` FROM `posts`" },
    { type = "query-is-set-contained-in", sql-1 = "SELECT `target_id` FROM `notifications` WHERE `type` = 'Notifications::StartedSharing'",     sql-2 = "SELECT `id` FROM `people`" },
    // End polymorphic associations.

    { type = "one-of-string", tbl = "posts", col = "type", allowed-values = ["Post", "StatusMessage", "Reshare"] },
    // NOT OBVIOUS: Cannot be the base class `Post`, which does not have method `post_location` defined (used at post_presenter.rb:70).
    { type = "one-of-string", tbl = "posts", col = "type", allowed-values = ["StatusMessage", "Reshare"] },
    { type = "one-of-string", tbl = "services", col = "type", allowed-values = ["Service", "Services::Tumblr", "Services::Twitter", "Services::Wordpress"] },

    // ***** Auto-generated start. *****
    { type = "one-of-string", tbl = "taggings", col = "taggable_type", allowed-values = ["Comment", "Profile", "StatusMessage"] },
    { type = "one-of-string", tbl = "roles", col = "name", allowed-values = ["admin", "moderator", "spotlight"] },
