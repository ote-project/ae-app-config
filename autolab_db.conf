jdbc-url = "jdbc:mysql://localhost:3306/autolab_test?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&character_set_server=utf8mb4&collation_server=utf8mb4_bin,autolab_test",
jdbc-driver-class = "com.mysql.cj.jdbc.Driver",
user-name = "autolab",
password = "12345678",
tbl-name-ignore-regexes = ["ar_internal_metadata", "schema_migrations", "module_.*", "oauth_.*"],
constraints = [
    // Primary keys.
    { type = "unique", tbl = "annotations", cols = ["id"] },
    { type = "unique", tbl = "announcements", cols = ["id"] },
    { type = "unique", tbl = "assessment_user_data", cols = ["id"] },
    { type = "unique", tbl = "assessments", cols = ["id"] },
    { type = "unique", tbl = "attachments", cols = ["id"] },
    { type = "unique", tbl = "authentications", cols = ["id"] },
    { type = "unique", tbl = "autograders", cols = ["id"] },
    { type = "unique", tbl = "course_user_data", cols = ["id"] },
    { type = "unique", tbl = "courses", cols = ["id"] },
    { type = "unique", tbl = "extensions", cols = ["id"] },
    { type = "unique", tbl = "groups", cols = ["id"] },
    { type = "unique", tbl = "problems", cols = ["id"] },
    { type = "unique", tbl = "risk_conditions", cols = ["id"] },
    { type = "unique", tbl = "scheduler", cols = ["id"] },
    { type = "unique", tbl = "score_adjustments", cols = ["id"] },
    { type = "unique", tbl = "scoreboards", cols = ["id"] },
    { type = "unique", tbl = "scores", cols = ["id"] },
    { type = "unique", tbl = "submissions", cols = ["id"] },
    { type = "unique", tbl = "users", cols = ["id"] },
    { type = "unique", tbl = "watchlist_instances", cols = ["id"] },

    // Uniqueness.
    { type = "unique", tbl = "courses", cols = ["name"] },
    { type = "unique", tbl = "extensions", cols = ["course_user_datum_id", "assessment_id"] },
    { type = "unique", tbl = "assessment_user_data", cols = ["latest_submission_id"] },
    { type = "unique", tbl = "assessments", cols = ["course_id", "name"] },
    { type = "unique", tbl = "submissions", cols = ["version", "course_user_datum_id", "assessment_id"] },
    { type = "unique", tbl = "scores", cols = ["problem_id", "submission_id"] },
    { type = "unique", tbl = "users", cols = ["email"] },

    // Foreign keys.
    { type = "foreign-key-non-null", from-tbl = "annotations", from-col = "submission_id", to-tbl = "submissions", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "annotations", from-col = "problem_id", to-tbl = "problems", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "announcements", from-col = "course_id", to-tbl = "courses", to-col = "id" },
    { type = "foreign-key", from-tbl = "announcements", from-col = "course_user_datum_id", to-tbl = "course_user_data", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "assessment_user_data", from-col = "course_user_datum_id", to-tbl = "course_user_data", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "assessment_user_data", from-col = "assessment_id", to-tbl = "assessments", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "assessment_user_data", from-col = "latest_submission_id", to-tbl = "submissions", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "assessment_user_data", from-col = "group_id", to-tbl = "groups", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "assessments", from-col = "course_id", to-tbl = "courses", to-col = "id" },
    { type = "non-null", tbl = "assessments", col = "late_penalty_id" },
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT `late_penalty_id` FROM `assessments`",
      sql-2 = "SELECT `id` FROM `score_adjustments` WHERE `type` = 'Penalty'" },
    { type = "non-null", tbl = "assessments", col = "version_penalty_id" },
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT `version_penalty_id` FROM `assessments`",
      sql-2 = "SELECT `id` FROM `score_adjustments` WHERE `type` = 'Penalty'" },

    { type = "foreign-key-non-null", from-tbl = "attachments", from-col = "course_id", to-tbl = "courses", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "attachments", from-col = "assessment_id", to-tbl = "assessments", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "authentications", from-col = "user_id", to-tbl = "users", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "autograders", from-col = "assessment_id", to-tbl = "assessments", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "course_user_data", from-col = "course_id", to-tbl = "courses", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "course_user_data", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "non-null", tbl = "course_user_data", col = "tweak_id" },
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT `tweak_id` FROM `course_user_data`",
      sql-2 = "SELECT `id` FROM `score_adjustments` WHERE `type` = 'Tweak'" },

    { type = "non-null", tbl = "courses", col = "late_penalty_id" },
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT `late_penalty_id` FROM `courses`",
      sql-2 = "SELECT `id` FROM `score_adjustments` WHERE `type` = 'Penalty'" },
    { type = "non-null", tbl = "courses", col = "version_penalty_id" },
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT `version_penalty_id` FROM `courses`",
      sql-2 = "SELECT `id` FROM `score_adjustments` WHERE `type` = 'Penalty'" },

    { type = "foreign-key-non-null", from-tbl = "extensions", from-col = "course_user_datum_id", to-tbl = "course_user_data", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "extensions", from-col = "assessment_id", to-tbl = "assessments", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "problems", from-col = "assessment_id", to-tbl = "assessments", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "risk_conditions", from-col = "course_id", to-tbl = "courses", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "scheduler", from-col = "course_id", to-tbl = "courses", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "scoreboards", from-col = "assessment_id", to-tbl = "assessments", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "scores", from-col = "submission_id", to-tbl = "submissions", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "scores", from-col = "problem_id", to-tbl = "problems", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "scores", from-col = "grader_id", to-tbl = "course_user_data", to-col = "id" },

    { type = "foreign-key-non-null", from-tbl = "submissions", from-col = "course_user_datum_id", to-tbl = "course_user_data", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "submissions", from-col = "assessment_id", to-tbl = "assessments", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "submissions", from-col = "submitted_by_id", to-tbl = "course_user_data", to-col = "id" },
    { type = "non-null", tbl = "submissions", col = "tweak_id" },
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT `tweak_id` FROM `submissions`",
      sql-2 = "SELECT `id` FROM `score_adjustments` WHERE `type` = 'Tweak'" },

    { type = "foreign-key-non-null", from-tbl = "watchlist_instances", from-col = "course_id", to-tbl = "courses", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "watchlist_instances", from-col = "course_user_datum_id", to-tbl = "course_user_data", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "watchlist_instances", from-col = "risk_condition_id", to-tbl = "risk_conditions", to-col = "id" },

    // Field integrity.
    { type = "non-null", tbl = "annotations", col = "comment" },
    { type = "non-null", tbl = "annotations", col = "filename" },
    // Not explicitly specified, but makes sense -- an announcement should not be empty!
    { type = "non-null", tbl = "announcements", col = "title" }, { type = "string-is-not-empty", tbl = "announcements", col = "title" },
    { type = "non-null", tbl = "announcements", col = "description" }, { type = "string-is-not-empty", tbl = "announcements", col = "description" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `announcements` WHERE `start_date` > `end_date`" }, // Not explicitly specified, but makes sense.
    { type = "one-of-int", tbl = "assessment_user_data", col = "membership_status", allowed-values = [0, 1, 2, 3] },
    { type = "one-of-int", tbl = "assessment_user_data", col = "grade_type", allowed-values = [0, 1, 2] },
    { type = "non-null", tbl = "assessments", col = "name" },
    { type = "string-is-not-empty", tbl = "assessments", col = "name" },
    { type = "non-null", tbl = "assessments", col = "display_name" },
    { type = "string-is-not-empty", tbl = "assessments", col = "display_name" },
    { type = "non-null", tbl = "assessments", col = "due_at" },
    { type = "non-null", tbl = "assessments", col = "end_at" },
    { type = "non-null", tbl = "assessments", col = "start_at" },
    { type = "non-null", tbl = "assessments", col = "grading_deadline" },
    { type = "non-null", tbl = "assessments", col = "category_name" },
    { type = "string-is-not-empty", tbl = "assessments", col = "category_name" },
    { type = "non-null", tbl = "assessments", col = "max_size" },
    { type = "non-null", tbl = "assessments", col = "max_submissions" },
    { type = "non-null", tbl = "assessments", col = "max_submissions" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `assessments` WHERE (`disable_handins` = 0 OR `disable_handins` IS NULL) AND (`handin_directory` IS NULL OR `handin_filename` IS NULL)" }, // Technically this need only apply when the assessment is active, but there's no harm in requiring it always.
    { type = "query-is-empty", sql = "SELECT 1 FROM `assessments` WHERE `start_at` > `due_at`" }, // verify_date_order
    { type = "query-is-empty", sql = "SELECT 1 FROM `assessments` WHERE `due_at` > `end_at`" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `assessments` WHERE `end_at` > `grading_deadline`" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `assessments` WHERE `version_threshold` < -1" },
    { type = "non-null", tbl = "attachments", col = "name" },
    { type = "non-null", tbl = "attachments", col = "filename" },
    { type = "non-null", tbl = "autograders", col = "autograde_image" },
    { type = "non-null", tbl = "autograders", col = "autograde_timeout" },
    { type = "non-null", tbl = "courses", col = "name" },
    { type = "string-is-not-empty", tbl = "courses", col = "name" },
    { type = "non-null", tbl = "courses", col = "display_name" },
    { type = "string-is-not-empty", tbl = "courses", col = "display_name" },
    { type = "non-null", tbl = "courses", col = "start_date" },
    { type = "non-null", tbl = "courses", col = "end_date" },
    { type = "non-null", tbl = "courses", col = "late_slack" },
    { type = "non-null", tbl = "courses", col = "grace_days" },
    { type = "non-null", tbl = "courses", col = "cgdub_dependencies_updated_at" }, // cgdub_dependencies_updated; and if it's NULL `ggl_cache_key` crashes
    { type = "query-is-empty", sql = "SELECT 1 FROM `courses` WHERE `start_date` > `end_date`" }, // order_of_dates
    { type = "query-is-empty", sql = "SELECT 1 FROM `courses` WHERE `grace_days` < 0" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `courses` WHERE `version_threshold` < -1" },
    { type = "query-is-empty", sql = "SELECT 1 FROM `extensions` WHERE `days` IS NULL AND `infinite` = 0" }, // days_or_infinite
    { type = "non-null", tbl = "problems", col = "name" },
    { type = "one-of-int", tbl = "risk_conditions", col = "condition_type", allowed-values = [0, 1, 2, 3, 4] },
    { type = "non-null", tbl = "scheduler", col = "action" },
    { type = "string-is-not-empty", tbl = "scheduler", col = "action" },
    { type = "non-null", tbl = "scheduler", col = "interval" }, // validates_numericality_of without allow_nil
    { type = "non-null", tbl = "score_adjustments", col = "value" },
    { type = "non-null", tbl = "score_adjustments", col = "kind" },
    { type = "one-of-string", tbl = "score_adjustments", col = "type", allowed-values = ["Tweak", "Penalty"] },
    { type = "one-of-int", tbl = "score_adjustments", col = "kind", allowed-values = [0, 1] },
    { type = "string-is-not-empty", "tbl" = "users", col = "first_name" },
    { type = "string-is-not-empty", "tbl" = "users", col = "last_name" },
    { type = "string-is-not-empty", "tbl" = "users", col = "email" },
    { type = "one-of-int", tbl = "watchlist_instances", col = "status", allowed-values = [0, 1, 2] },

    // Constrain `created_at` and `updated_at` to be NOT NULL.  (Why are some of them DEFAULT NULL?)
    { type = "non-null", col = "created_at", tbl = "annotations" },
    { type = "non-null", col = "created_at", tbl = "announcements" },
    { type = "non-null", col = "created_at", tbl = "assessment_user_data" },
    { type = "non-null", col = "created_at", tbl = "assessments" },
    { type = "non-null", col = "created_at", tbl = "attachments" },
    { type = "non-null", col = "created_at", tbl = "authentications" },
    { type = "non-null", col = "created_at", tbl = "course_user_data" },
    { type = "non-null", col = "created_at", tbl = "problems" },
    { type = "non-null", col = "created_at", tbl = "scheduler" },
    { type = "non-null", col = "created_at", tbl = "scores" },
    { type = "non-null", col = "created_at", tbl = "submissions" },
    { type = "non-null", col = "created_at", tbl = "users" },
    { type = "non-null", col = "updated_at", tbl = "annotations" },
    { type = "non-null", col = "updated_at", tbl = "announcements" },
    { type = "non-null", col = "updated_at", tbl = "assessment_user_data" },
    { type = "non-null", col = "updated_at", tbl = "assessments" },
    { type = "non-null", col = "updated_at", tbl = "attachments" },
    { type = "non-null", col = "updated_at", tbl = "authentications" },
    { type = "non-null", col = "updated_at", tbl = "course_user_data" },
    { type = "non-null", col = "updated_at", tbl = "problems" },
    { type = "non-null", col = "updated_at", tbl = "scheduler" },
    { type = "non-null", col = "updated_at", tbl = "scores" },
    { type = "non-null", col = "updated_at", tbl = "submissions" },
    { type = "non-null", col = "updated_at", tbl = "users" },

    { type = "query-is-empty", // If a submission has a `filename`, it must have a `real_filename`.
      sql = "SELECT 1 FROM `submissions` WHERE `filename` IS NOT NULL AND `real_filename` IS NULL" },
    { type = "query-is-set-contained-in", // If a submission has a `real_filename`, its parent assessment must have a `handin_filename` and `handin_directory`.
      sql-1 = "SELECT `assessment_id` FROM `submissions` WHERE `real_filename` IS NOT NULL",
      sql-2 = "SELECT `id` FROM `assessments` WHERE `handin_filename` IS NOT NULL AND `handin_directory` IS NOT NULL"
    },

    { type = "query-is-set-contained-in", // Every submission must have an assessment_user_datum.
      sql-1 = "SELECT `assessment_id`, `course_user_datum_id` FROM `submissions`",
      sql-2 = "SELECT `assessment_id`, `course_user_datum_id` FROM `assessment_user_data`",
    }

    { type = "query-is-set-contained-in",
      sql-1 = "SELECT `assessment_user_data`.`id`, `assessments`.`course_id` FROM `assessments`, `assessment_user_data` WHERE `assessment_user_data`.`assessment_id` = `assessments`.`id`",
      sql-2 = "SELECT `assessment_user_data`.`id`, `course_user_data`.`course_id` FROM `assessment_user_data`, `course_user_data` WHERE `assessment_user_data`.`course_user_datum_id` = `course_user_data`.`id`" },
    { type = "query-is-empty", sql = "SELECT 1 FROM assessment_user_data, submissions WHERE assessment_user_data.latest_submission_id = submissions.id AND assessment_user_data.course_user_datum_id <> submissions.course_user_datum_id" },
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT attachments.id, attachments.course_id FROM attachments",
      sql-2 = "SELECT attachments.id, courses.id FROM attachments, assessments, courses WHERE attachments.assessment_id = assessments.id AND assessments.course_id = courses.id" },
    { type = "query-is-empty", sql = "SELECT 1 FROM submissions, assessments, course_user_data WHERE submissions.assessment_id = assessments.id AND submissions.course_user_datum_id = course_user_data.id AND assessments.course_id <> course_user_data.course_id" }, // user_and_assessment_in_same_course
    { type = "query-is-set-contained-in",
      sql-1 = "SELECT watchlist_instances.id, watchlist_instances.course_id FROM watchlist_instances",
      sql-2 = "SELECT watchlist_instances.id, course_user_data.course_id FROM watchlist_instances, course_user_data WHERE watchlist_instances.course_user_datum_id = course_user_data.id" },

    // Assume current user is logged in (exists) and has been confirmed.
    { type = "param-query-is-not-empty", sql = "SELECT 1 FROM `users` WHERE `users`.`id` = ?", params = ["user_id"] },
    { type = "param-query-is-empty", sql = "SELECT 1 FROM `users` WHERE `users`.`id` = ? AND `users`.`confirmed_at` IS NULL", params = ["user_id"] },
    
    // === Below are constraints that help with concolic execution. ===
    { type = "nullable-strings-not-empty" },

    // Extract policy only for non-admin users; the policy for admin users is trivial to write!
    { type = "param-query-is-empty", sql = "SELECT 1 FROM `users` WHERE `users`.`id` = ? AND `users`.`administrator` = 1", params = ["user_id"] },

    { type = "one-of-string", tbl = "assessments", col = "name", allowed-values = ["foo", "bar", "baz"] },
    { type = "one-of-string", tbl = "assessments", col = "display_name", allowed-values = ["foo", "bar", "baz"] },
    { type = "one-of-string", tbl = "courses", col = "name", allowed-values = ["foo", "bar", "baz"] },
    { type = "one-of-string", tbl = "courses", col = "display_name", allowed-values = ["foo", "bar", "baz"] },
    { type = "one-of-string", tbl = "course_user_data", col = "nickname", allowed-values = ["foo", "bar", "baz"] },
    { type = "one-of-string", tbl = "users", col = "theme", allowed-values = ["default"] },

    // Force JSON field to be NULL -- the driver treats JSON columns as string columns, and might not generate valid JSON!
    { type = "query-is-empty", sql = "SELECT 1 FROM `watchlist_instances` WHERE `watchlist_instances`.`violation_info` IS NOT NULL" },

    // Ignore scheduler for now -- a scheduled action can have nothing to do with the current user or course, so not a good idea to consider it for access control?
    // { type = "query-is-empty", sql = "SELECT 1 FROM `scheduler`" },
]
