jdbc-url = "jdbc:mysql://localhost:3306/theodinproject_test?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&character_set_server=utf8mb4&collation_server=utf8mb4_bin,theodinproject_test",
jdbc-driver-class = "com.mysql.cj.jdbc.Driver",
user-name = "theodinproject",
password = "12345678",
tbl-name-ignore-regexes = ["ar_internal_metadata", "schema_migrations"],
constraints = [
    // Primary keys.
    { type = "unique", tbl = "admin_flashes", cols = ["id"] },
    { type = "unique", tbl = "courses", cols = ["id"] },
    { type = "unique", tbl = "flags", cols = ["id"] },
    { type = "unique", tbl = "friendly_id_slugs", cols = ["id"] },
    { type = "unique", tbl = "lesson_completions", cols = ["id"] },
    { type = "unique", tbl = "lessons", cols = ["id"] },
    { type = "unique", tbl = "notifications", cols = ["id"] },
    { type = "unique", tbl = "path_prerequisites", cols = ["id"] },
    { type = "unique", tbl = "paths", cols = ["id"] },
    { type = "unique", tbl = "points", cols = ["id"] },
    { type = "unique", tbl = "project_submissions", cols = ["id"] },
    { type = "unique", tbl = "sections", cols = ["id"] },
    { type = "unique", tbl = "success_stories", cols = ["id"] },
    { type = "unique", tbl = "user_providers", cols = ["id"] },
    { type = "unique", tbl = "users", cols = ["id"] },
    { type = "unique", tbl = "votes", cols = ["id"] },

    // Uniqueness.
    { type = "unique", tbl = "courses", cols = ["identifier_uuid"] },
    { type = "unique", tbl = "friendly_id_slugs", cols = ["slug", "sluggable_type", "scope"] },
    { type = "unique", tbl = "lesson_completions", cols = ["lesson_id", "user_id"] },
    { type = "unique", tbl = "lessons", cols = ["identifier_uuid", "section_id"] },
    { type = "unique", tbl = "lessons", cols = ["slug", "section_id"] },
    { type = "unique", tbl = "path_prerequisites", cols = ["path_id", "prerequisite_id"] },
    { type = "unique", tbl = "paths", cols = ["identifier_uuid"] },
    { type = "unique", tbl = "paths", cols = ["slug"] },
    { type = "unique", tbl = "points", cols = ["discord_id"] },
    { type = "unique", tbl = "project_submissions", cols = ["user_id", "lesson_id"] },
    { type = "unique", tbl = "sections", cols = ["identifier_uuid"] },
    { type = "unique", tbl = "users", cols = ["email"] },
    { type = "unique", tbl = "users", cols = ["confirmation_token"] },
    { type = "unique", tbl = "users", cols = ["reset_password_token"] },

    // Foreign keys.
    { type = "foreign-key-non-null", from-tbl = "courses", from-col = "path_id", to-tbl = "paths", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "flags", from-col = "flagger_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "flags", from-col = "project_submission_id", to-tbl = "project_submissions", to-col = "id" },
    { type = "foreign-key", from-tbl = "flags", from-col = "resolved_by_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "lesson_completions", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "lesson_completions", from-col = "lesson_id", to-tbl = "lessons", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "lessons", from-col = "section_id", to-tbl = "sections", to-col = "id" },
    { type = "one-of-string", tbl = "notifications", col = "recipient_type", allowed-values = ["User"] },
    { type = "foreign-key-non-null", from-tbl = "notifications", from-col = "recipient_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "path_prerequisites", from-col = "path_id", to-tbl = "paths", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "path_prerequisites", from-col = "prerequisite_id", to-tbl = "paths", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "project_submissions", from-col = "user_id", to-tbl = "users", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "project_submissions", from-col = "lesson_id", to-tbl = "lessons", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "sections", from-col = "course_id", to-tbl = "courses", to-col = "id" },
    { type = "foreign-key-non-null", from-tbl = "user_providers", from-col = "user_id", to-tbl = "users", to-col = "id" },
    // NOT OBVIOUS
    // The `User` model file says `path_id` is optional, but the application crashes if `path_id` is NULL at:
    // `app/views/shared/_navbar_modal.html.erb: 19`
    { type = "foreign-key-non-null", from-tbl = "users", from-col = "path_id", to-tbl = "paths", to-col = "id" },

    // `ProjectSubmission` is the only model that has `acts_as_votable`.
    { type = "non-null", tbl = "votes", col = "votable_type" },
    { type = "one-of-string", tbl = "votes", col = "votable_type", allowed-values = ["ProjectSubmission"] },
    { type = "foreign-key-non-null", from-tbl = "votes", from-col = "votable_id", to-tbl = "project_submissions", to-col = "id" },
    // `User` is the only model that has `acts_as_voter`.
    { type = "non-null", tbl = "votes", col = "voter_type" },
    { type = "one-of-string", tbl = "votes", col = "voter_type", allowed-values = ["User"] },
    { type = "foreign-key-non-null", from-tbl = "votes", from-col = "voter_id", to-tbl = "users", to-col = "id" },

    // Field integrity.
    { type = "non-null", tbl = "admin_flashes", col = "message" },
    { type = "string-is-not-empty", tbl = "admin_flashes", col = "message" },
    { type = "non-null", tbl = "admin_flashes", col = "expires" },
    // NOT OBVIOUS
    // If nil, the application crashes at: `./app/views/courses/_course_card.html.erb:17`
    { type = "non-null", tbl = "courses", col = "title" },
    { type = "non-null", tbl = "courses", col = "position" },
    // NOT OBVIOUS
    // If nil, the application crashes at: `./app/views/lessons/show.html.erb:20`
    { type = "non-null", tbl = "lessons", col = "content" },
    { type = "string-is-not-empty", tbl = "flags", col = "reason" },
    { type = "one-of-int", tbl = "flags", col = "status", allowed-values = [0, 1] },
    { type = "one-of-int", tbl = "flags", col = "taken_action", allowed-values = [0, 1, 2, 3] },
    { type = "non-null", tbl = "paths", col = "title" },
    { type = "string-is-not-empty", tbl = "paths", col = "title" },
    { type = "non-null", tbl = "paths", col = "description" },
    { type = "string-is-not-empty", tbl = "paths", col = "description" },
    { type = "non-null", tbl = "paths", col = "position" },
    { type = "non-null", tbl = "project_submissions", col = "repo_url" },
    { type = "string-is-not-empty", tbl = "project_submissions", col = "repo_url" },
    // NOT OBVIOUS
    // If nil, the application crashes at: `app/views/courses/course/_sections.html.erb:3`
    { type = "non-null", tbl = "sections", col = "title" },
    { type = "non-null", tbl = "users", col = "username" }, // Implied by `length: { in: 2..100 }` in the model.
    { type = "string-is-not-empty", tbl = "users", col = "username" },

    // From `LessonCompletionController#create`.
    { type = "query-is-set-contained-in", // `lesson_completion.lesson_identifier_uuid = lesson_completion.lesson.identifier_uuid`
      sql-1 = "SELECT `id`, `lesson_identifier_uuid` FROM `lesson_completions`",
      sql-2 = "SELECT `lesson_completions`.`id`, `lessons`.`identifier_uuid` FROM `lesson_completions` INNER JOIN `lessons` ON `lesson_completions`.`lesson_id` = `lessons`.`id`",
    },
    { type = "query-is-set-contained-in", // `lesson_completion.course_id = lesson_completion.lesson.section.course_id`
      sql-1 = "SELECT `id`, `course_id` FROM `lesson_completions`",
      sql-2 = "SELECT `lesson_completions`.`id`, `sections`.`course_id` FROM `lesson_completions` INNER JOIN `lessons` ON `lesson_completions`.`lesson_id` = `lessons`.`id` INNER JOIN `sections` ON `lessons`.`section_id` = `sections`.`id`",
    },
    { type = "query-is-set-contained-in", // `lesson_completion.path_id = lesson_completion.lesson.section.course.path_id`
      sql-1 = "SELECT `id`, `path_id` FROM `lesson_completions`",
      sql-2 = "SELECT `lesson_completions`.`id`, `courses`.`path_id` FROM `lesson_completions` INNER JOIN `lessons` ON `lesson_completions`.`lesson_id` = `lessons`.`id` INNER JOIN `sections` ON `lessons`.`section_id` = `sections`.`id` INNER JOIN `courses` ON `sections`.`course_id` = `courses`.`id`",
    },

    // Constrain `created_at` and `updated_at` to be NOT NULL.  (Why are some of them DEFAULT NULL?)
    { type = "non-null", col = "created_at", tbl = "admin_flashes" },
    { type = "non-null", col = "created_at", tbl = "courses" },
    { type = "non-null", col = "created_at", tbl = "flags" },
    { type = "non-null", col = "created_at", tbl = "lesson_completions" },
    { type = "non-null", col = "created_at", tbl = "lessons" },
    { type = "non-null", col = "created_at", tbl = "notifications" },
    { type = "non-null", col = "created_at", tbl = "path_prerequisites" },
    { type = "non-null", col = "created_at", tbl = "paths" },
    { type = "non-null", col = "created_at", tbl = "project_submissions" },
    { type = "non-null", col = "created_at", tbl = "sections" },
    { type = "non-null", col = "created_at", tbl = "success_stories" },
    { type = "non-null", col = "created_at", tbl = "user_providers" },
    { type = "non-null", col = "created_at", tbl = "users" },
    { type = "non-null", col = "created_at", tbl = "votes" },
    { type = "non-null", col = "updated_at", tbl = "admin_flashes" },
    { type = "non-null", col = "updated_at", tbl = "courses" },
    { type = "non-null", col = "updated_at", tbl = "flags" },
    { type = "non-null", col = "updated_at", tbl = "lesson_completions" },
    { type = "non-null", col = "updated_at", tbl = "lessons" },
    { type = "non-null", col = "updated_at", tbl = "notifications" },
    { type = "non-null", col = "updated_at", tbl = "path_prerequisites" },
    { type = "non-null", col = "updated_at", tbl = "paths" },
    { type = "non-null", col = "updated_at", tbl = "project_submissions" },
    { type = "non-null", col = "updated_at", tbl = "sections" },
    { type = "non-null", col = "updated_at", tbl = "success_stories" },
    { type = "non-null", col = "updated_at", tbl = "user_providers" },
    { type = "non-null", col = "updated_at", tbl = "users" },
    { type = "non-null", col = "updated_at", tbl = "votes" },

    // Make sure `user.email` adheres to `URI::MailTo::EMAIL_REGEXP`.
    { type = "one-of-string", tbl = "users", col = "email", allowed-values = ["foo@example.com", "bar@example.com", "baz@example.com"] },

    // === Below are constraints that help with concolic execution. ===
    { type = "nullable-strings-not-empty" },
]
