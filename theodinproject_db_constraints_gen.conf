{ type = "non-null", tbl = "sections", col = "updated_at" },
{ type = "non-null", tbl = "success_stories", col = "created_at" },
{ type = "non-null", tbl = "success_stories", col = "updated_at" },
{ type = "non-null", tbl = "user_providers", col = "created_at" },
{ type = "non-null", tbl = "user_providers", col = "updated_at" },
{ type = "non-null", tbl = "active_admin_comments", col = "created_at" },
{ type = "non-null", tbl = "active_admin_comments", col = "updated_at" },
{ type = "non-null", tbl = "friendly_id_slugs", col = "created_at" },

// Enums.
{ type = "one-of-int", tbl = "flags", col = "status", allowed-values = [0, 1] },
{ type = "one-of-int", tbl = "flags", col = "taken_action", allowed-values = [0, 1, 2, 3] },

